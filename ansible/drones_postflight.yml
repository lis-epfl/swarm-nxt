---

- name: Copy the local log to the right place
  hosts: localhost
  gather_facts: true
  vars:
    timestamp: "{{ lookup('pipe', 'date +%Y/%m/%d/%H%M%S') }}"
  tasks:
    - name: Create facts
      set_fact:
        run_dir: "{{ host_base_path }}/consolidated_logs/{{ timestamp }}"
    - name: Create timestamped run directory on controller
      ansible.builtin.file:
       path: "{{ run_dir }}"
       state: directory
       mode: "0755"

    - name: Copy latest logs to consolidated folder
      ansible.posix.synchronize:
       mode: push
       src: "{{ host_base_path }}/logs/latest"
       dest: "{{ run_dir }}/host"
       recursive: yes
       archive: yes
       compress: yes
       rsync_opts:
         - "--mkpath"
    - name: Create latest consolidated log link
      ansible.builtin.file:
        src: "{{ run_dir }}"
        dest: "{{ host_base_path }}/consolidated_logs/latest"
        state: link

- name: Collect logs from drones into timestamped run folder
  hosts: drones
  remote_user: lis
  gather_facts: true
  tasks:
    # 1. Stop the nodes to ensure files are closed and stats written
    - name: Stop ROS packages to flush logs
      ansible.builtin.systemd:
        name: ros_packages
        state: stopped
        scope: user

    # 2. Wait a moment to ensure IO operations complete
    - name: Wait for shutdown flush
      ansible.builtin.pause:
        seconds: 3

    # 3. Collect the data
    - name: Pull latest log contents from each drone into its hostname subfolder
      ansible.posix.synchronize:
        mode: pull
        src: "{{ drone_base_path }}/logs/latest/"
        dest: "{{ host_base_path }}/consolidated_logs/latest/{{ ansible_hostname }}/"
        recursive: yes
        archive: yes
        compress: yes
        rsync_opts:
          - "--mkpath"
          # mcap (cams/recording.mcap) and db3 (rosbag2 sqlite) are already
          # compressed; skip wire-compression for them to save CPU on both ends.
          - "--skip-compress=mcap,db3,jpg,jpeg,png,zst,gz"
      delegate_to: localhost

    - name: Pull MPC and Planner logs
      ansible.posix.synchronize:
        mode: pull
        src: "{{ item.src }}"
        dest: "{{ host_base_path }}/consolidated_logs/latest/{{ ansible_hostname }}/{{ item.name }}/"
        recursive: yes
        archive: yes
        compress: yes
        rsync_opts:
          - "--mkpath"
          # mcap (cams/recording.mcap) and db3 (rosbag2 sqlite) are already
          # compressed; skip wire-compression for them to save CPU on both ends.
          - "--skip-compress=mcap,db3,jpg,jpeg,png,zst,gz"
      delegate_to: localhost
      ignore_errors: true
      loop:
        - { src: "/tmp/mpc_logs/latest/", name: "mpc_logs" }
        - { src: "/tmp/planner_logs/", name: "planner_logs" }

    - name: Pull Depth logs
      when: enable_depth | default(false) | bool
      ansible.posix.synchronize:
        mode: pull
        src: "/tmp/depth_logs/"
        dest: "{{ host_base_path }}/consolidated_logs/latest/{{ ansible_hostname }}/depth_logs/"
        recursive: yes
        archive: yes
        compress: yes
        rsync_opts:
          - "--mkpath"
          # mcap (cams/recording.mcap) and db3 (rosbag2 sqlite) are already
          # compressed; skip wire-compression for them to save CPU on both ends.
          - "--skip-compress=mcap,db3,jpg,jpeg,png,zst,gz"
      delegate_to: localhost
      ignore_errors: true

    # 4. Restart the nodes immediately (while analysis runs on host)
    - name: Restart ROS packages
      ansible.builtin.systemd:
        name: ros_packages
        state: started
        scope: user

    # 5. Recover any cam recordings whose mcap footer wasn't written
    #    (oak_compressed_recorder is sometimes SIGKILL'd by systemd's
    #    cgroup cleanup mid-finalize).  The data records are intact;
    #    this rewrites them into a well-formed mcap with a proper
    #    footer/index so Foxglove and `mcap info` can open it directly.
    - name: Recover truncated cam mcaps
      ansible.builtin.shell: |
        for src in "{{ host_base_path }}/consolidated_logs/latest"/*/cams/recording.mcap; do
          [ -f "$src" ] || continue
          dst="${src%.mcap}_fixed.mcap"
          # Skip if a fresh _fixed already exists for this src
          if [ -f "$dst" ] && [ "$dst" -nt "$src" ]; then
            echo "skip (already recovered): $src"
            continue
          fi
          echo "recovering: $src"
          python3 "{{ playbook_dir }}/scripts/recover_mcap.py" "$src" "$dst" \
            && rm -f "$src" \
            && mv "$dst" "$src" \
            && echo "  -> $src is now valid"
        done
      args:
        executable: /bin/bash
      delegate_to: localhost
      run_once: true
      changed_when: false

    # 6. Run Analysis
    - name: Analyze consolidated logs
      ansible.builtin.command: >
        python3 scripts/analyze_logs.py --log-dir "{{ host_base_path }}/consolidated_logs/latest"
      args:
        chdir: "{{ playbook_dir }}"
      register: analysis_output
      delegate_to: localhost
      run_once: true

    - name: Display analysis results
      ansible.builtin.debug:
        msg: "{{ analysis_output.stdout_lines }}"
      delegate_to: localhost
      run_once: true
